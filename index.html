<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz 24 - Rita</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; }
        
        #ui {
            position: absolute;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            color: white;
            display: none;
        }

        .numero-24 {
            font-size: 8rem;
            font-weight: bold;
            line-height: 1;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,215,0,0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        h1 { font-size: 1.2rem; margin-bottom: -5px; font-weight: normal; letter-spacing: 5px; opacity: 0.8; }
        p { font-size: 1.1rem; margin-top: 10px; font-style: italic; letter-spacing: 3px; opacity: 0.8; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        #start-btn {
            position: absolute;
            padding: 15px 30px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
            z-index: 100;
            letter-spacing: 2px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        #start-btn:hover { background: rgba(255, 255, 255, 0.2); }

        #music-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <button id="start-btn">TE TENGO UNA SORPRESA ❤️</button>
    <button id="music-control">🎵</button>

    <div id="ui">
        <h1>FELIZ CUMPLEAÑOS 🫂</h1>
        <div class="numero-24">24</div>
        <p>PARA RITA 🎂✨</p>
    </div>

    <audio id="miMusica" src="musica.mp3" loop></audio>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const ui = document.getElementById('ui');
        const musica = document.getElementById('miMusica');
        const musicBtn = document.getElementById('music-control');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        let fireworks = [];

        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.alpha = 1;
                this.friction = 0.97; // Un poco menos de fricción para que duren más
                this.gravity = 0.08;  // Menos gravedad para que floten más
                this.decay = Math.random() * 0.01 + 0.005; // Desaparición más lenta
                this.size = Math.random() * 2 + 0.5;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                const hue = Math.random() * 360;
                this.color = `hsl(${hue}, 80%, 60%)`;
                this.targetY = Math.random() * (canvas.height * 0.5) + 50;
                this.vy = -Math.random() * 3 - 8;
                this.exploded = false;
            }
            update() {
                this.y += this.vy;
                this.vy += 0.1; 
                if (this.vy >= 0 || this.y <= this.targetY) {
                    this.explode();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = "#fff";
                ctx.fill();
            }
            explode() {
                this.exploded = true;
                // --- AJUSTE AQUÍ ---
                // He aumentado la cantidad de partículas y su velocidad de expansión
                for (let i = 0; i < 200; i++) { // Más partículas
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 2; // Mayor velocidad de expansión (antes *6 + 1)
                    particles.push(new Particle(this.x, this.y, this.color, Math.cos(angle) * speed, Math.sin(angle) * speed));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.04) fireworks.push(new Firework());

            fireworks.forEach((f, i) => {
                f.update();
                f.draw();
                if (f.exploded) fireworks.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            ui.style.display = 'block';
            musicBtn.style.display = 'block';
            musica.play().catch(() => console.log("Audio esperando interacción"));
            animate();
        });

        musicBtn.addEventListener('click', () => {
            if (musica.paused) {
                musica.play();
                musicBtn.textContent = "🎵";
            } else {
                musica.pause();
                musicBtn.textContent = "🔇";
            }
        });
    </script>
</body>
</html>
